name: Keep Supabase Alive

on:
  schedule:
    # 5日に1回、UTC 0:00 (JST 9:00) に実行
    - cron: '0 0 */5 * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write to Supabase keepalive table
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keepalive?id=eq.1" \
            -X PATCH \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')
          echo "Response status: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "Supabase keepalive updated!"
          else
            echo "Warning: Unexpected status code $response"
            exit 1
          fi
